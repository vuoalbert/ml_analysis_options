run_name: smoke

universe:
  symbol: SPY
  cross_asset:
    - TLT
    - UUP
    - XLK
    - XLF
    - ^VIX

window:
  start: "2025-06-01"
  end:   "2026-03-31"
  holdout_start: "2026-03-15"
  rth_only: true
  tz: "America/New_York"

tuning_frac: 0.4   # smoke: small hyperparam search partition

label:
  horizon_min: 15
  dead_zone_bp: 2.0

features:
  return_lags: [1, 2, 3, 5, 10, 30]
  vol_windows: [5, 15, 60]
  rsi_window: 14
  macd: [12, 26, 9]
  bollinger_window: 20
  vwap_window: 30
  vol_zscore_window: 10

fred_series:
  - T10Y2Y
  - BAMLH0A0HYM2

splits:
  train_months: 2
  val_months:   1
  test_months:  1

model:
  kind: lightgbm
  objective: multiclass
  num_class: 3
  metric: multi_logloss
  seed: 42
  early_stopping_rounds: 25
  optuna_trials: 5
  use_class_weights: false

threshold_tuning:
  threshold_floor: 0.55
  min_trades: 40
  grid_step: 0.02

costs:
  half_spread_bp: 0.5
  slippage_bp:    0.5
  commission_per_share: 0.0
  fill_policy: next_bar_open

risk:
  max_position_notional_frac: 0.10
  flat_by_minutes_before_close: 5
  skip_first_minutes: 5
  skip_last_minutes: 5
  daily_dd_kill_frac: 0.02

live:
  paper: true
  poll_seconds: 60
  heartbeat_log_seconds: 300
