run_name: v1

universe:
  symbol: SPY
  cross_asset:
    - ES=F
    - ^VIX
    - TLT
    - UUP
    - XLK
    - XLF
    - XLE
    - XLV
    - XLY
    - XLP
    - XLI
    - XLU
    - XLRE
    - XLB
    - XLC

window:
  start: "2023-04-01"
  end:   "2026-03-31"
  holdout_start: "2026-03-01"   # untouched final test month
  rth_only: true
  tz: "America/New_York"

tuning_frac: 0.5   # fraction of non-holdout data used for hyperparam tuning

label:
  horizon_min: 15
  # Dead-zone around 0 expressed in basis points of the forward return.
  # Model only learns edges larger than ~half-spread + slippage.
  # Longer horizon -> larger noise floor, scale dead-zone up proportionally.
  dead_zone_bp: 2.0

features:
  return_lags: [1, 2, 3, 5, 10, 30]
  vol_windows: [5, 15, 60]
  rsi_window: 14
  macd: [12, 26, 9]
  bollinger_window: 20
  vwap_window: 30
  vol_zscore_window: 20   # days (same-minute z across past N sessions)

fred_series:
  - T10Y2Y          # 2s10s spread
  - BAMLH0A0HYM2    # HY OAS
  - DFII10          # 10yr real yield

splits:
  # Walk-forward: train 6mo, val 1mo, test 1mo, roll monthly.
  train_months: 6
  val_months:   1
  test_months:  1

model:
  kind: lightgbm
  objective: multiclass
  num_class: 3
  metric: multi_logloss
  seed: 42
  early_stopping_rounds: 50
  optuna_trials: 30
  use_class_weights: false   # v1 with weights pushed the model toward the minority "flat" class

threshold_tuning:
  # Prevents degenerate "trade every bar" solutions by enforcing minimum conviction + trade count.
  threshold_floor: 0.55
  min_trades: 100
  grid_step: 0.02

costs:
  half_spread_bp: 0.5    # SPY is extremely tight
  slippage_bp:    0.5
  commission_per_share: 0.0   # Alpaca
  fill_policy: next_bar_open

risk:
  # Vol-scaled exit policy (research backed via research/backtest_compare.py).
  # stop_bps  = clip(vol_scaled_K * realized_vol_bps(lookback), 5, 100)
  # target_bps = stop_bps * vol_scaled_rr        (1:2 R/R default)
  vol_scaled_K: 1.5
  vol_scaled_rr: 2.0
  vol_lookback_min: 30
  min_stop_bps: 5.0
  max_stop_bps: 100.0
  max_notional_frac: 2.0             # cap qty so notional ≤ 2.0× equity (matches Alpaca paper 2× DT BP)

  # Conviction-weighted sizing (research-backed via research/run_conviction_only.py):
  #   s = clip((p - conviction_lo) / (conviction_hi - conviction_lo), 0, 1)
  #   risk_pct = risk_pct_base + (risk_pct_max - risk_pct_base) * s
  # → barely-above-threshold trades risk 0.5%, high-conviction trades risk up to 1.0%.
  # Backtest (2yr): +15% profit, ~neutral Sharpe, same drawdown profile.
  risk_pct_base: 0.005               # 0.5% of equity at p = conviction_lo
  risk_pct_max:  0.010               # 1.0% of equity at p ≥ conviction_hi
  conviction_lo: 0.55                # bottom of conviction ramp (matches model threshold)
  conviction_hi: 0.70                # top of conviction ramp (full risk_pct_max)
  # legacy / fallback if conviction params are missing:
  risk_pct_per_trade: 0.005

  # V2 exit predictors (research-backed via research/run_v2_tight.py).
  # When use_v2_exits is true, _plan_exit predicts stop_bps / target_bps / hold_min
  # from features at entry instead of using vol_scaled_K / vol_scaled_rr / no horizon.
  # Vol-scaled K and rr above are kept as fallback if the v2 bundle fails to load.
  # Backtest (2yr): tight v2 retains 100%+ of loose's profit (+$121k vs live),
  # OOS Sharpe improves on 3 of 4 windows (Feb, Mar, Apr 2026).
  use_v2_exits: true
  v2_exit_artifact: research_v2_exit_tight
  v2_target_min_rr: 1.0      # target_bps must be ≥ stop_bps × this (no inverted barriers)
  v2_target_max_bps: 200.0   # absolute cap on predicted target distance
  v2_hold_min: 5             # min predicted hold time (minutes)
  v2_hold_max: 390           # max predicted hold time (minutes — full session)
  flat_by_minutes_before_close: 5
  skip_first_minutes: 5
  skip_last_minutes: 5
  daily_dd_kill_frac: 0.02           # halt trading for the day if -2% equity

live:
  paper: true
  poll_seconds: 60
  heartbeat_log_seconds: 300

# Strategy mode — pick how the entry signal gets executed.
#
# Options-mode config below is the "research-validated winner" from the
# multi-window OOS sweep (research/sweep_v4_stress_oos.py). It beats the
# stock baseline ($41,455 / 6mo) at +$44,801 with realistic IV dynamics,
# survives stress-tested IV β scenarios down to +$32k (worst-case),
# and is profitable on every non-overlapping window from H1 2024 through
# Apr 2026 (>1.5 years, ~1,650 trades total).
#
# Key changes from the original 0DTE design:
#   • 7-day-to-expiry options, not 0DTE — theta is 9× lighter
#   • Conviction filter at p ≥ 0.55 (entry threshold)
#   • Multi-position (up to 3 concurrent open contracts)
#   • theta_protect OFF — only meaningful for 0DTE
#   • Wider max_qty cap so 2% risk sizing isn't pinned at 10 contracts
strategy:
  mode: options                     # "stocks" or "options"

  # Options-mode parameters (used when mode == "options")
  options:
    moneyness: atm                   # "atm" / "otm" / "itm"
    expiration: 7_business_days      # "same_day" (0DTE) / "7_business_days" / "next_friday" / "next_monthly"
    risk_pct_per_trade: 0.02         # 2% of equity per trade in premium
    max_qty_contracts: 100           # raised from 10 — 2% risk needs more headroom
    max_concurrent_positions: 15     # allow up to 15 open contracts at once
                                     # (validated: 30mo OOS + 5mo recent, all positive,
                                     # worst DD ~−$6,834 ≈ 23% of $30k equity)
    stop_pct: 0.50                   # exit if premium drops 50%
    target_pct: 1.00                 # exit if premium doubles
    theta_protect_mins: 0            # OFF for 7DTE (was 60 for 0DTE)
    conviction_min: 0.55             # require p_up or p_dn ≥ this to enter (matches stock threshold)
    underlying: SPY                  # which underlying to trade options on
